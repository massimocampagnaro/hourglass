<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hourglass</title>
    <meta name="description" content="A minimal, configurable hourglass timer — use it standalone or as a Pomodoro-style focus/break timer.">

    <!-- Google Fonts — Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<a class="corner-link corner-link--left" href="https://massimocampagnaro.github.io/" target="_blank" rel="noopener">About me</a>
<button type="button" class="corner-link corner-link--right" id="muteBtn" aria-label="Mute done sound" aria-pressed="false">🔊</button>

<header class="site-header">
    <h1>Hourglass</h1>
    <p class="subtitle">A quiet way to watch time pass</p>
</header>

<main>
    <div class="stage">
        <div class="hourglass-shell" id="hourglassShell">
            <div class="hourglass-canvas-wrap" id="hourglassWrap">
                <!-- SVG glass + sand injected here by hourglass.js -->
                <canvas id="grainCanvas" class="grain-canvas"></canvas>
            </div>
        </div>

        <div class="time-readout" id="timeReadout">05:00</div>

        <div class="controls">
            <div class="duration-control">
                <label for="durationInput">Minutes</label>
                <input type="number" id="durationInput" min="1" max="180" step="1" value="5" inputmode="numeric">
            </div>

            <div class="preset-row" id="presetRow">
                <button type="button" class="preset-btn" data-minutes="5">5</button>
                <button type="button" class="preset-btn" data-minutes="25">25</button>
                <button type="button" class="preset-btn" data-minutes="30">30</button>
                <button type="button" class="preset-btn" data-minutes="60">60</button>
            </div>

            <div class="button-row">
                <button type="button" class="btn btn-primary" id="startPauseBtn">Start</button>
                <button type="button" class="btn" id="resetBtn">Reset</button>
                <button type="button" class="preset-btn" id="popOutBtn" aria-label="Open in a resizable popup window" title="Open in a resizable popup window">
                    <svg width="24" height="24" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h560v-280h80v280q0 33-23.5 56.5T760-120H200Zm188-212-56-56 372-372H560v-80h280v280h-80v-144L388-332Z"/>
                    </svg>
                </button>
            </div>

            <label class="toggle-row">
                <input type="checkbox" id="physicalFlipToggle">
                <span class="toggle-switch"></span>
                <span>Keep sand on flip</span>
            </label>

            <p class="hint">Click the hourglass to flip it over</p>
            <p class="hint">Space to start/pause &middot; R to reset &middot; F to flip</p>
        </div>
    </div>
</main>

<footer class="site-footer">
    <p>© 2026 Massimo Campagnaro</p>
    <p><a href="https://github.com/massimocampagnaro/hourglass#embedding" target="_blank" rel="noopener">Embeddable on your own site — see it on GitHub</a></p>
</footer>

<script src="js/hourglass.js"></script>
<script src="js/shared.js"></script>
<script src="js/app.js"></script>
</body>
</html>
