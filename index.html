<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hourglass</title>
    <meta name="description" content="A minimal, configurable hourglass timer — use it standalone or as a Pomodoro-style focus/break timer.">

    <!-- Google Fonts — Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<a class="corner-link corner-link--left" href="https://massimocampagnaro.github.io/" target="_blank" rel="noopener">About me</a>
<button type="button" class="corner-link corner-link--right" id="muteBtn" aria-label="Mute done sound" aria-pressed="false">🔊</button>

<header class="site-header">
    <h1>Hourglass</h1>
    <p class="subtitle">A quiet way to watch time pass</p>
</header>

<main>
    <div class="stage">
        <div class="global-toolbar">
            <button type="button" class="btn" id="pomodoroBtn">Pomodoro</button>
            <label class="toggle-row">
                <input type="checkbox" id="autoModeToggle">
                <span class="toggle-switch"></span>
                <span>Automatic mode</span>
            </label>
        </div>

        <div class="hourglass-row" id="hourglassRow">
            <!-- hourglass cards (and the trailing "+" card) injected here by js/cards.js -->
        </div>

        <div class="controls">
            <button type="button" class="preset-btn" id="popOutBtn" aria-label="Open in a resizable popup window" title="Open in a resizable popup window">
                <svg width="24" height="24" viewBox="0 -960 960 960" fill="currentColor" aria-hidden="true" focusable="false">
                    <path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h560v-280h80v280q0 33-23.5 56.5T760-120H200Zm188-212-56-56 372-372H560v-80h280v280h-80v-144L388-332Z"/>
                </svg>
            </button>

            <label class="toggle-row">
                <input type="checkbox" id="physicalFlipToggle">
                <span class="toggle-switch"></span>
                <span>Keep sand on flip</span>
            </label>

            <p class="hint">Click a hourglass to flip it over &middot; edit (pencil) to reconfigure</p>
            <p class="hint">Space to start/pause &middot; R to reset &middot; F to flip the focused hourglass</p>
        </div>
    </div>
</main>

<footer class="site-footer">
    <p>© 2026 Massimo Campagnaro</p>
    <p><a href="https://github.com/massimocampagnaro/hourglass#embedding" target="_blank" rel="noopener">Embeddable on your own site — see it on GitHub</a></p>
</footer>

<script src="js/hourglass.js"></script>
<script src="js/shared.js"></script>
<script src="js/cards.js"></script>
<script src="js/app.js"></script>
</body>
</html>
