<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hourglass — Embed</title>
    <meta name="description" content="Embeddable hourglass timer widget — hourglass and time only, transparent background.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Google Fonts — Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/embed.css">
</head>
<body class="embed-body">

<div class="stage">
    <div class="hourglass-shell" id="hourglassShell">
        <div class="hourglass-canvas-wrap" id="hourglassWrap">
            <!-- SVG glass + sand injected here by hourglass.js -->
            <canvas id="grainCanvas" class="grain-canvas"></canvas>
        </div>
    </div>

    <div class="time-readout" id="timeReadout">05:00</div>
</div>

<script src="../js/hourglass.js"></script>
<script src="../js/shared.js"></script>
<script src="embed.js"></script>
</body>
</html>
